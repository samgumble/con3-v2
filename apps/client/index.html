<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Con3 — Construction RTS</title>
  </head>
  <body>
    <div id="app"></div>

    <div id="resourcebar">
      <span class="res"><i class="ico funds"></i><b id="res-funds">0</b><span class="lbl">Funds</span></span>
      <span class="res"><i class="ico mats"></i><b id="res-materials">0</b><span class="lbl">Materials</span></span>
      <span class="res"><i class="ico labor"></i><b id="res-labor">0/0</b><span class="lbl">Labor</span></span>
    </div>

    <div id="hud">
      <div class="hud-title">CON<span>3</span> <small>— Phase 2 · economy</small></div>
      <div class="hud-stats">
        <span>Crews <b id="stat-units">0</b></span>
        <span>Selected <b id="stat-sel">0</b></span>
      </div>
      <div class="hud-help">
        <b>Left-drag</b> select · <b>Right-click</b> move · <b>Right-click a deposit</b> to gather ·
        <b>WASD/Arrows</b> pan · <b>Q/E</b> rotate · <b>Wheel</b> zoom · <b>Esc</b> cancel build
      </div>
    </div>

    <div id="buildbar">
      <div class="build-title">TRAIN</div>
      <div class="train-btns"></div>
      <div class="build-title" style="margin-top: 10px">BUILD</div>
      <div class="build-btns"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
