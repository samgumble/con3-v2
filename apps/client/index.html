<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Con3 — Construction RTS</title>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="hud-title">CON<span>3</span> <small>— Phase 1 · crews &amp; pathfinding</small></div>
      <div class="hud-stats">
        <span>Tick <b id="stat-tick">0</b></span>
        <span>Crews <b id="stat-units">0</b></span>
        <span>Selected <b id="stat-sel">0</b></span>
      </div>
      <div class="hud-help">
        <b>Left-drag</b> select · <b>Right-click</b> move ·
        <b>WASD/Arrows</b> pan · <b>Q/E</b> rotate · <b>Wheel</b> zoom ·
        <b>Shift</b> add to selection
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
