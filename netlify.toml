# Netlify deploy config for the Con3 client.
# pnpm monorepo: install at root, build only the client, publish its dist.
# Netlify auto-provisions pnpm from the root package.json "packageManager" field.
[build]
  command = "pnpm install --frozen-lockfile=false && pnpm --filter @con3/client build"
  publish = "apps/client/dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_FLAGS = "--frozen-lockfile=false"

# SPA fallback (single HTML entry).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
